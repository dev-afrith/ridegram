<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideGram - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dark-mode.css">
</head>

<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back</a>

    <div class="login-page">
        <div class="login-card animate-on-scroll">
            <div class="login-header">
                <div class="login-logo"><i class="fas fa-motorcycle"></i> RideGram</div>
                <p class="login-tagline">Ride · Connect · Explore</p>
            </div>
            <div class="login-body">
                <div class="error-message" id="error-msg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Error message here</span>
                </div>

                <div class="login-tabs">
                    <button class="login-tab active" data-form="email-form">Email</button>
                    <button class="login-tab" data-form="mobile-form">Mobile</button>
                </div>

                <form id="email-form" class="login-form active">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
                </form>

                <form id="mobile-form" class="login-form">
                    <div class="form-group">
                        <label class="form-label">Mobile Number</label>
                        <div class="phone-input-group">
                            <input type="text" class="form-input country-code" value="+91" readonly>
                            <div class="form-input-wrapper phone-number">
                                <i class="fas fa-phone input-icon"></i>
                                <input type="tel" id="mobile" class="form-input" placeholder="Mobile number" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="mobile-password" class="form-input" placeholder="••••••••"
                                required>
                        </div>
                    </div>
                    <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
                </form>

                <div class="demo-credentials">
                    <div class="demo-credentials-title"><i class="fas fa-key"></i> Demo Credentials</div>
                    <p>Email: <code>example@gmail.com</code></p>
                    <p>Password: <code>example</code></p>
                    <p style="margin-top:4px;">Mobile: <code>1234</code> / Password: <code>1234</code></p>
                </div>

                <div class="divider"><span>OR</span></div>

                <div class="social-login">
                    <button class="social-btn" onclick="showToast('Google login coming soon','info')"><i
                            class="fab fa-google"></i> Google</button>
                    <button class="social-btn" onclick="showToast('Facebook login coming soon','info')"><i
                            class="fab fa-facebook-f"></i> Facebook</button>
                </div>

                <div class="login-helper">
                    Don't have an account? <a href="feed.html">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/motion.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
